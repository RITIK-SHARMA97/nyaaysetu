services:
  db:
    image: postgres:16-alpine
    container_name: nyaay-db
    environment:
      POSTGRES_USER: nyaay
      POSTGRES_PASSWORD: setu2024
      POSTGRES_DB: nyaaysetu
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyaay -d nyaaysetu"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: nyaay-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./docs/sample-judgments:/app/uploads
      - api_uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://nyaay:setu2024@db:5432/nyaaysetu
      JWT_SECRET: ${JWT_SECRET:-nyaaysetu-local-secret}
    command: >
      sh -c "python -c 'from app.database import create_tables; create_tables()' &&
             python scripts/seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
  frontend:
    image: node:20-alpine
    container_name: nyaay-frontend
    working_dir: /app
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: >
      sh -c "if [ ! -d node_modules/next ]; then
               npm install;
             fi &&
             find .next -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true &&
             exec npm run dev"
    depends_on:
      - api

volumes:
  pgdata:
  api_uploads:
